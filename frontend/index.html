<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H2V Messenger</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

  <!-- ─── AUTH SCREEN ─────────────────────────────────────────── -->
  <div id="auth-screen" class="screen active">
    <div class="auth-box">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="#6C63FF"/>
          <path d="M10 14h20M10 20h14M10 26h10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>H2V</span>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form active">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn-primary" id="login-btn">Войти</button>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form">
        <div class="field">
          <label>Никнейм</label>
          <input type="text" id="reg-nickname" placeholder="vitaly_123" required autocomplete="username" />
          <span class="field-hint">Только латиница, цифры и _ (мин. 3 символа)</span>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="Минимум 8 символов" required autocomplete="new-password" />
        </div>
        <div id="register-error" class="error-msg"></div>
        <button type="submit" class="btn-primary" id="reg-btn">Создать аккаунт</button>
      </form>
    </div>
  </div>

  <!-- ─── MAIN APP SCREEN ──────────────────────────────────────── -->
  <div id="app-screen" class="screen">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="my-avatar" id="my-avatar">?</div>
        <span class="my-nickname" id="my-nickname">...</span>
        <button class="icon-btn" id="logout-btn" title="Выйти">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="conn-status" id="conn-status"></div>
      <div class="search-wrap">
        <input type="text" id="user-search" placeholder="🔍  Найти пользователя..." />
        <div id="search-results" class="search-results hidden"></div>
      </div>

      <div class="chats-label">Чаты</div>
      <div id="chat-list" class="chat-list">
        <div class="empty-state">Нет чатов</div>
      </div>
    </aside>

    <!-- Chat area -->
    <main class="chat-area" id="chat-area">
      <div class="no-chat-selected">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Выбери чат слева или найди пользователя</p>
      </div>
    </main>
  </div>

  <!-- ─── CHAT TEMPLATE ────────────────────────────────────────── -->
  <template id="chat-window-tpl">
    <div class="chat-window">
      <div class="chat-header">
        <div class="chat-avatar" id="cw-avatar">?</div>
        <div class="chat-meta">
          <div class="chat-name" id="cw-name">—<span id="cw-e2e" class="e2e-badge" style="display:none">🔒 E2E</span></div>
          <div class="chat-status" id="cw-status">офлайн</div>
        </div>
      </div>
      <div class="messages" id="cw-messages"></div>
      <div class="typing-bar" id="cw-typing"></div>
      <form class="message-form" id="cw-form">
        <input type="text" id="cw-input" placeholder="Сообщение..." autocomplete="off" />
        <button type="submit" class="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  </template>

  <script src="signal-protocol.js?v=1"></script>
  <script src="crypto-store.js?v=1"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
