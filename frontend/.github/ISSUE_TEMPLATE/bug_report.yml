name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible so we can reproduce and fix the issue quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is affected?
      options:
        - Frontend (Web App)
        - Backend (API / WebSocket)
        - Push Notifications
        - E2E Encryption (Secret Chats)
        - Authentication (OTP / Login)
        - Media Upload
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Open the app and log in
        2. Navigate to a chat
        3. Send a message
        4. See error / unexpected behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please fill in the relevant details.
      value: |
        - Browser / Platform: [e.g. Chrome 124, iOS Safari, PWA]
        - OS: [e.g. Windows 11, macOS 14, Android 14]
        - Node.js version (if running locally): [e.g. 20.11.0]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Paste any relevant console errors, server logs, or attach screenshots.
        Tip: Wrap logs in triple backticks for better formatting.
    validations:
      required: false
