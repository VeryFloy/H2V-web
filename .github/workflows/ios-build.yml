name: iOS Build & Sign

on:
  push:
    branches: [main]
    paths:
      - 'h2v_ios/**'
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (Ad Hoc)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Validate: no localhost URLs ───────────────────────────────────────
      - name: Check production URLs
        run: |
          if grep -r "localhost" h2v_ios/h2v_ios/Network.swift; then
            echo "❌ ERROR: localhost found in Network.swift — use production URL!"
            exit 1
          fi
          echo "✅ URLs look clean"

      # ── 2. Select Xcode 16 ────────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      # ── 3. Import signing certificate ────────────────────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "temp_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_pass" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp_pass" build.keychain
          rm /tmp/certificate.p12

      # ── 4. Install provisioning profile ──────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/h2v_adhoc.mobileprovision

      # ── 5. Build & Archive ────────────────────────────────────────────────────
      - name: Build archive
        run: |
          cd h2v_ios
          xcodebuild archive \
            -project h2v_ios.xcodeproj \
            -scheme h2v_ios \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ${{ runner.temp }}/h2v.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="h2v_adhoc" \
            DEVELOPMENT_TEAM=ZYDGWHPX4W \
            | xcpretty || exit 1

      # ── 6. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/h2v.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist h2v_ios/ExportOptions.plist \
            | xcpretty || exit 1

      # ── 7. Upload artifact ────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2V-iOS-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
