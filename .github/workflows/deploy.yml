name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy frontend to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/root/H2V test/frontend"
          rm: false

      - name: Clean stale files from previous deploys
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "/root/H2V test/frontend"
            rm -rf .git .DS_Store \
              frontend/ messenger-backend/ app/ gradle/ ico/ scripts/ p12/ "new front css/" \
              build.gradle.kts gradle.properties settings.gradle.kts BUGS.md SECURITY.md roadmap.md \
              .editorconfig app.js crypto-store.js signal-protocol.js style.css \
              commit_msg.txt "GPL-3.0 license" 2>/dev/null || true

      - name: Build frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd "/root/H2V test/frontend"
            npm ci
            npm run build
