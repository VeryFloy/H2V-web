name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please describe what you'd like to see and why it would be valuable.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is this for?
      options:
        - Frontend (Web App)
        - Backend (API / WebSocket)
        - Push Notifications
        - E2E Encryption
        - Authentication
        - Media / Files
        - iOS App
        - Performance
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Describe what you're trying to accomplish.
      placeholder: "I'm frustrated when... / I wish I could..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references that would help.
    validations:
      required: false
